{{- if .Values.finalizerCleaner.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-finalizer-cleaner
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-finalizer-cleaner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-finalizer-cleaner
subjects:
- kind: ServiceAccount
  name: node-finalizer-cleaner
  namespace: {{ .Values.namespace }}
{{- end }}
